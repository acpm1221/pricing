<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="pricing.css">
  <title>Pricing</title>
</head>
<body>

  <main class="container">

    <h1 class="title">Our Pricing</h1>

    <input type="checkbox" id="toggle">

    <div class="toggle">
      <span>Annually</span>

      <label for="toggle" class="switch">
        <span class="slider"></span>
      </label>

      <span>Monthly</span>
    </div>

    <div class="cards">

      <!-- Basic -->
      <div class="card">
        <h2>Basic</h2>

        <p class="price">
          <span class="annual">$199.99</span>
          <span class="monthly">$19.99</span>
        </p>

        <ul>
          <li>500 GB Storage</li>
          <li>2 Users Allowed</li>
          <li>Send up to 3 GB</li>
        </ul>

        <button>Learn More</button>
      </div>

      <!-- Professional -->
      <div class="card card--highlight">
        <h2>Professional</h2>

        <p class="price">
          <span class="annual">$249.99</span>
          <span class="monthly">$24.99</span>
        </p>

        <ul>
          <li>1 TB Storage</li>
          <li>5 Users Allowed</li>
          <li>Send up to 10 GB</li>
        </ul>

        <button>Learn More</button>
      </div>

     
      <div class="card">
        <h2>Master</h2>

        <p class="price">
          <span class="annual">$399.99</span>
          <span class="monthly">$39.99</span>
        </p>

        <ul>
          <li>2 TB Storage</li>
          <li>10 Users Allowed</li>
          <li>Send up to 20 GB</li>
        </ul>

        <button>Learn More</button>
      </div>

    </div>
  </main>

</body>
</html>
